# tmux-sessionizer config
# https://github.com/ThePrimeagen/.dotfiles

# Search paths for project directories
TS_SEARCH_PATHS=(~/_www)

# Additional search paths with optional depth (path:depth)
# TS_EXTRA_SEARCH_PATHS=(~/projects:3 ~/.config:2)

# Session commands — accessed via tmux-sessionizer -s <index>
# index 0 = -s 0 (window 69), index 1 = -s 1 (window 70), etc.
TS_SESSION_COMMANDS=("opencode ." "lazygit")

# Max depth for directory search (default: 1)
# TS_MAX_DEPTH=2

# Logging (for debugging)
# TS_LOG=file   # "file" writes to TS_LOG_FILE, "echo" prints to stdout
# TS_LOG_FILE=~/.local/share/tmux-sessionizer/tmux-sessionizer.logs
