[settings]
legacy_version_file = true

[settings.ruby]
compile = false

[env]
ASDF_PHP_FPM = "1"

[plugins]
php = "https://github.com/ramsey/asdf-php.git"

[tools]
atuin = "latest"
btop = "latest"
bun = "latest"
"aqua:cloudflare/cloudflared" = "latest"
"aqua:YS-L/csvlens" = "latest"
"github:AlDanial/cloc" = "latest"
delta = "latest"
eza = "latest"
fd = "latest"
fzf = "latest"
go = "latest"
lazydocker = "latest"
lazygit = "latest"
node = "lts"
# uses ramsey/asdf-php (static binaries, no phpize/php-config)
php = "8.4"
ripgrep = "latest"
ruby = "latest"
rust = "latest"
starship = "latest"
zoxide = "latest"
